services:
  file-validation-nextjs-nginx:
    build:
      context: .
      target: development
    container_name: file-validation-nextjs-nginx
    environment:
      NODE_ENV: development
      DOCKER_ENV: "true"
    command: ["npm", "run", "dev"]
    develop:
      watch:
        - action: sync 
          path: ./app
          target: /file-validation-nextjs-nginx/app
          initial_sync: true
        - action: sync
          path: ./next.config.ts
          target: /file-validation-nextjs-nginx/next.config.ts
          initial_sync: true
        - action: sync
          path: ./public
          target: /file-validation-nextjs-nginx/public
          initial_sync: true
        - action: sync
          path: ./_lib
          target: /file-validation-nextjs-nginx/_lib
          initial_sync: true


        - action: rebuild
          path: ./package.json
        
  nginx:
    build:
      context: ./nginx
    develop:
      watch:
        - action: sync+restart
          path: ./nginx/default.conf
          target: /etc/nginx/conf.d/default.conf
          initial_sync: true
    restart: unless-stopped
    ports:
      - 80:80
    depends_on:
      - file-validation-nextjs-nginx